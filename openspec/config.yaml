version: "1.0"
context: |
  unlimitedClaw is a Go AI assistant learning project following PicoClaw's architecture.
  Tech stack: Go 1.25+, cobra CLI, modernc.org/sqlite, Docker, Kubernetes.
  Architecture: 4-layer architecture with cmd/ composition root, core/ domain logic, foundation/ primitives, feature/ optional modules, and internal/ adapters.
rules:
  - Use Go stdlib testing package + testify/assert for tests
  - Follow Go naming conventions (camelCase, PascalCase for exports)
  - Use constructor-based dependency injection, no DI frameworks
  - All interfaces defined in core, implementations in adapter packages
  - CGO_ENABLED=0 compatible only (pure Go dependencies)
ai_collaboration:
  - 使用第一性原理思考：在实施前先理解"为什么"，而非直接跳到"怎么做"
  - 目标不清晰时及时暂停并与用户讨论，不要在模糊的前提下盲目推进
  - 目标清晰但路径不是最优时，主动说明并给出更好的方案，而非机械执行
